<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>curious glen</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #242424;
      --text: #ddd;
      --muted: #555;
      --glen-accent: #8ab4f8;
      --jonny-accent: #4a6fa5;
      --tool-color: #6dbf8a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, 'Times New Roman', serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-shrink: 0;
    }

    header .name {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    header .date {
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0.5;
      font-family: monospace;
    }

    /* ── start screen ── */
    #start-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    #start-screen p {
      font-size: 0.85rem;
      color: var(--muted);
      font-family: monospace;
      min-height: 1.2em;
    }

    button#start-btn {
      background: none;
      border: 1px solid var(--glen-accent);
      color: var(--glen-accent);
      padding: 10px 32px;
      font-size: 0.9rem;
      font-family: Georgia, serif;
      letter-spacing: 0.06em;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.15s, color 0.15s;
    }

    button#start-btn:hover { background: var(--glen-accent); color: var(--bg); }
    button#start-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── chat ── */
    #chat-screen {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    #thread {
      flex: 1;
      overflow-y: auto;
      padding: 28px 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      scroll-behavior: smooth;
    }

    .msg-row {
      padding: 10px 28px;
      display: flex;
      flex-direction: column;
      max-width: 100%;
    }

    .msg-row.glen { align-items: flex-start; }
    .msg-row.jonny { align-items: flex-end; }

    .sender {
      font-size: 0.7rem;
      letter-spacing: 0.07em;
      margin-bottom: 5px;
      color: var(--muted);
      font-family: monospace;
    }

    .msg-row.glen .sender { color: var(--glen-accent); }

    .bubble {
      max-width: 680px;
      padding: 12px 16px;
      line-height: 1.65;
      font-size: 0.92rem;
      white-space: pre-wrap;
      border-radius: 3px;
    }

    .msg-row.glen .bubble {
      background: var(--surface);
      border-left: 2px solid var(--glen-accent);
    }

    .msg-row.jonny .bubble {
      background: #151c28;
      border-right: 2px solid var(--jonny-accent);
    }

    .tool-row {
      padding: 5px 28px;
      font-size: 0.75rem;
      font-family: monospace;
      color: var(--tool-color);
      opacity: 0.75;
    }

    .tool-row::before { content: '→ '; }

    /* ── input ── */
    #input-area {
      border-top: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 13px;
      font-size: 0.92rem;
      font-family: Georgia, serif;
      border-radius: 2px;
      resize: none;
      height: 44px;
      line-height: 1.4;
      transition: border-color 0.15s;
    }

    #msg-input:focus { outline: none; border-color: var(--glen-accent); }
    #msg-input:disabled { opacity: 0.4; }

    button#send-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0 18px;
      cursor: pointer;
      border-radius: 2px;
      font-size: 0.8rem;
      font-family: monospace;
      transition: border-color 0.15s, color 0.15s;
    }

    button#send-btn:hover { border-color: var(--glen-accent); color: var(--glen-accent); }
    button#send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <span class="name">curious glen</span>
  <span class="date" id="date-display"></span>
</header>

<div id="start-screen">
  <p id="start-status">ready to begin</p>
  <button id="start-btn" onclick="startSession()">start today's session</button>
</div>

<div id="chat-screen">
  <div id="thread"></div>
  <div id="input-area">
    <textarea id="msg-input" placeholder="say something..." onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendMessage()">send</button>
  </div>
</div>

<script>
  const TODAY = new Date().toISOString().split('T')[0];
  document.getElementById('date-display').textContent = TODAY;

  let history = [];
  let streaming = false;
  let activeBubble = null;
  let activeBubbleText = '';
  let cumulativeAssistantText = '';

  function scrollToBottom() {
    const thread = document.getElementById('thread');
    thread.scrollTop = thread.scrollHeight;
  }

  function addGlenBubble() {
    const thread = document.getElementById('thread');
    const row = document.createElement('div');
    row.className = 'msg-row glen';

    const sender = document.createElement('div');
    sender.className = 'sender';
    sender.textContent = 'glen';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    row.appendChild(sender);
    row.appendChild(bubble);
    thread.appendChild(row);
    scrollToBottom();
    return bubble;
  }

  function addJonnyBubble(text) {
    const thread = document.getElementById('thread');
    const row = document.createElement('div');
    row.className = 'msg-row jonny';

    const sender = document.createElement('div');
    sender.className = 'sender';
    sender.textContent = 'jonny';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    row.appendChild(sender);
    row.appendChild(bubble);
    thread.appendChild(row);
    scrollToBottom();
  }

  function addToolEvent(text) {
    const thread = document.getElementById('thread');
    const div = document.createElement('div');
    div.className = 'tool-row';
    div.textContent = text;
    thread.appendChild(div);
    scrollToBottom();
  }

  function setInputEnabled(enabled) {
    document.getElementById('msg-input').disabled = !enabled;
    document.getElementById('send-btn').disabled = !enabled;
  }

  async function startSession() {
    const btn = document.getElementById('start-btn');
    const status = document.getElementById('start-status');
    btn.disabled = true;
    status.textContent = 'fetching articles...';

    try {
      const res = await fetch('/api/start', { method: 'POST' });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      status.textContent = `${data.count} articles ready`;

      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('chat-screen').style.display = 'flex';

      // Glen auto-starts reading
      await runChat('The articles are ready. Start reading — tell me what catches your eye.', true);
    } catch (e) {
      status.textContent = `error: ${e.message}`;
      btn.disabled = false;
    }
  }

  async function runChat(userContent, hidden = false) {
    if (streaming) return;
    streaming = true;
    setInputEnabled(false);

    history.push({ role: 'user', content: userContent });
    if (!hidden) addJonnyBubble(userContent);

    activeBubble = addGlenBubble();
    activeBubbleText = '';
    cumulativeAssistantText = '';

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ history })
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const event = JSON.parse(line.slice(6));

          if (event.type === 'text') {
            activeBubbleText += event.text;
            cumulativeAssistantText += event.text;
            activeBubble.textContent = activeBubbleText;
            scrollToBottom();

          } else if (event.type === 'tool') {
            // Close current bubble if empty
            if (!activeBubbleText) {
              activeBubble.closest('.msg-row').remove();
            }

            // Show tool event
            if (event.name === 'write_memory') {
              addToolEvent(`memory: ${event.input?.memory?.topic || event.input?.slug}`);
            } else if (event.name === 'run_report') {
              addToolEvent('compiling report...');
            } else if (event.name === 'rebuild_graph') {
              addToolEvent('rebuilding graph...');
            }

            // New bubble for continued text after tool
            activeBubble = addGlenBubble();
            activeBubbleText = '';

          } else if (event.type === 'done') {
            if (!activeBubbleText) {
              activeBubble.closest('.msg-row').remove();
            }

          } else if (event.type === 'error') {
            activeBubble.textContent = `[error: ${event.text}]`;
          }
        }
      }

      if (cumulativeAssistantText) {
        history.push({ role: 'assistant', content: cumulativeAssistantText });
      }

    } catch (e) {
      if (activeBubble) activeBubble.textContent = `[error: ${e.message}]`;
    }

    streaming = false;
    setInputEnabled(true);
    document.getElementById('msg-input').focus();
  }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || streaming) return;
    input.value = '';
    await runChat(text);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }
</script>

</body>
</html>
