<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Glen</title>
<style>
/* ---- variables & reset ---- */
:root {
  --bg: #161618;
  --surface: #1e1e20;
  --card: #252527;
  --card-hover: #2c2c2e;
  --border: rgba(255,255,255,0.07);
  --orange: #d97757;
  --orange-dim: rgba(217,119,87,0.12);
  --orange-hover: #c96843;
  --text: #f2ede4;
  --muted: #8a8680;
  --muted2: #5a5856;
  --green: #3cb371;
  --yellow: #e5b84a;
  --red: #d45a5a;
  --sidebar-w: 210px;
  --font: -apple-system, 'Inter', BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.6; }
a { color: var(--orange); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ---- layout ---- */
body { display: flex; }
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: #111113;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 0;
  height: 100vh;
  position: sticky;
  top: 0;
}
#main {
  flex: 1;
  height: 100vh;
  overflow: hidden;
  position: relative;
}

/* ---- sidebar ---- */
.logo {
  padding: 22px 20px 16px;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text);
  border-bottom: 1px solid var(--border);
}
.logo span { color: var(--orange); }

#nav { flex: 1; padding: 10px 0; }
.nav-link {
  display: flex;
  align-items: center;
  padding: 9px 20px;
  cursor: pointer;
  color: var(--muted);
  font-size: 13.5px;
  font-weight: 500;
  border-left: 2px solid transparent;
  transition: color 0.15s, background 0.15s;
  user-select: none;
}
.nav-link:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.nav-link.active { color: var(--text); border-left-color: var(--orange); background: rgba(217,119,87,0.07); }

/* ---- token gauge ---- */
.gauge-wrap {
  padding: 16px 20px 20px;
  border-top: 1px solid var(--border);
}
.gauge-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}
.gauge-label { font-size: 11px; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.05em; }
.gauge-num { font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; transition: color 0.3s; }
.gauge-track { height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
.gauge-fill { height: 100%; background: var(--orange); border-radius: 2px; width: 0%; transition: width 0.4s, background 0.4s; }
.gauge-fill.yellow { background: var(--yellow); }
.gauge-fill.red { background: var(--red); }
.gauge-sub { font-size: 11px; color: var(--muted2); margin-top: 4px; }

/* ---- tabs ---- */
.tab { display: none; height: 100vh; overflow-y: auto; flex-direction: column; }
.tab.active { display: flex; }
.tab-header { padding: 28px 32px 0; border-bottom: 1px solid var(--border); padding-bottom: 20px; flex-shrink: 0; }
.tab-header h1 { font-size: 20px; font-weight: 700; margin-bottom: 14px; letter-spacing: -0.3px; }
.tab-body { padding: 24px 32px; flex: 1; }

/* ---- buttons ---- */
.btn-primary {
  background: var(--orange);
  color: #fff;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  font-family: var(--font);
}
.btn-primary:hover { background: var(--orange-hover); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
  font-family: var(--font);
}
.btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
.btn-ghost:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-danger {
  background: var(--red);
  color: #fff;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  font-family: var(--font);
}
.btn-danger:hover { background: #c04444; }

/* ---- badges ---- */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.badge-granted { background: rgba(60,179,113,0.15); color: var(--green); }
.badge-pending { background: rgba(229,184,74,0.15); color: var(--yellow); }
.badge-deferred { background: rgba(138,134,128,0.12); color: var(--muted); }

/* ---- cards ---- */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px;
}
.card:hover { background: var(--card-hover); }

/* ---- inputs ---- */
.search-input {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--orange); }
.search-input::placeholder { color: var(--muted2); }

/* ---- empty state ---- */
.empty-state { color: var(--muted2); font-style: italic; padding: 40px 0; text-align: center; }

/* ---- TODAY tab ---- */
.stat-row { display: flex; gap: 24px; margin-bottom: 4px; }
.stat { display: flex; flex-direction: column; }
.stat span { font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text); line-height: 1; }
.stat label { font-size: 11px; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 3px; }
.action-row { display: flex; gap: 10px; padding: 20px 32px 0; flex-shrink: 0; }
.run-log {
  margin: 16px 32px 0;
  background: #0e0e10;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 16px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  max-height: 160px;
  overflow-y: auto;
  flex-shrink: 0;
}
.run-log .log-line { padding: 1px 0; }
.run-log .log-error { color: var(--red); }
.run-log .log-done { color: var(--green); }
.hidden { display: none !important; }

/* ---- article browser ---- */
.article-browser {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 16px 32px 24px;
  overflow: hidden;
  min-height: 0;
}
.browser-nav {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
  flex-shrink: 0;
}
.nav-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  width: 32px;
  height: 32px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}
.nav-btn:hover { background: var(--card-hover); }
.art-counter { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }
.art-link { margin-left: auto; font-size: 12px; }
.art-card { flex: 1; overflow-y: auto; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 22px 24px; }
.art-scores { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.score-pill {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 4px;
  background: rgba(217,119,87,0.1);
  color: var(--orange);
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}
.score-pill.dim { background: rgba(90,88,86,0.2); color: var(--muted); }
.art-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; line-height: 1.3; }
.art-extract { font-size: 13.5px; color: var(--muted); line-height: 1.7; font-family: var(--mono); }

/* ---- CHAT tab ---- */
#tab-chat { overflow: hidden; }
.chat-picker {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 16px;
  padding: 40px;
}
.chat-picker h2 { font-size: 20px; font-weight: 700; }
.picker-sub { color: var(--muted); font-size: 13px; }
.picker-cards { display: flex; gap: 16px; margin-top: 8px; }
.picker-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 22px 28px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 6px;
  text-align: left;
  width: 200px;
  transition: border-color 0.15s, background 0.15s;
  font-family: var(--font);
}
.picker-card:hover { border-color: var(--orange); background: var(--orange-dim); }
.picker-card strong { font-size: 15px; color: var(--text); }
.picker-card span { font-size: 12px; color: var(--muted); line-height: 1.4; }
.chat-ui { display: flex; flex-direction: column; height: 100%; }
.chat-topbar {
  display: flex;
  align-items: center;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  flex-shrink: 0;
}
.mode-label { font-size: 12px; color: var(--muted); }
.mode-label strong { color: var(--orange); }
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.msg { max-width: 78%; display: flex; flex-direction: column; gap: 4px; }
.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.assistant { align-self: flex-start; align-items: flex-start; }
.msg-label { font-size: 11px; color: var(--muted2); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
.msg-bubble {
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
  line-height: 1.65;
  white-space: pre-wrap;
}
.msg.user .msg-bubble { background: rgba(217,119,87,0.15); border: 1px solid rgba(217,119,87,0.2); }
.msg.assistant .msg-bubble { background: var(--card); border: 1px solid var(--border); }
.msg-bubble.streaming::after { content: '▍'; animation: blink 0.8s infinite; opacity: 0.7; }
@keyframes blink { 0%,100% { opacity: 0.7; } 50% { opacity: 0; } }
.chat-input-wrap {
  display: flex;
  gap: 10px;
  padding: 14px 24px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--surface);
}
.chat-input {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 14px;
  font-family: var(--font);
  outline: none;
  resize: none;
  max-height: 160px;
  transition: border-color 0.15s;
  line-height: 1.5;
}
.chat-input:focus { border-color: var(--orange); }
.chat-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 24px 12px;
  flex-shrink: 0;
}
.chat-tokens { font-size: 12px; color: var(--muted2); font-variant-numeric: tabular-nums; }
.chat-tokens.warn { color: var(--yellow); }
.chat-tokens.over { color: var(--red); }

/* ---- MEMORY tab ---- */
.memory-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.memory-controls .search-input { width: 240px; }
.toggle-group { display: flex; gap: 2px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 2px; }
.toggle {
  background: transparent;
  border: none;
  color: var(--muted);
  padding: 5px 12px;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  font-family: var(--font);
  transition: background 0.15s, color 0.15s;
}
.toggle.active { background: var(--orange); color: #fff; }
.memory-grid { padding: 20px 32px; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
.memory-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 18px;
  transition: border-color 0.15s;
}
.memory-card:hover { border-color: rgba(217,119,87,0.3); }
.memory-card.human { border-left: 3px solid rgba(217,119,87,0.5); }
.mem-topic { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.mem-date { font-size: 11px; color: var(--muted2); margin-bottom: 8px; }
.mem-what { font-size: 12.5px; color: var(--muted); line-height: 1.6; margin-bottom: 8px; }
.mem-why { font-size: 12px; color: var(--text); line-height: 1.5; margin-bottom: 8px; }
.mem-why::before { content: '↳ '; color: var(--orange); }
.mem-uncertainty { font-size: 11.5px; color: var(--muted2); font-style: italic; margin-bottom: 10px; }
.mem-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.mem-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(255,255,255,0.05);
  color: var(--muted);
  cursor: pointer;
  border: 1px solid transparent;
  transition: border-color 0.15s, color 0.15s;
}
.mem-tag:hover { border-color: var(--orange); color: var(--orange); }

/* ---- CONNECTIONS tab ---- */
.query-bar { display: flex; gap: 10px; align-items: center; }
.query-bar .search-input { width: 300px; }
.breadcrumb { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; margin-top: 12px; }
.crumb {
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
  transition: color 0.15s, border-color 0.15s;
}
.crumb:hover { color: var(--orange); border-color: var(--orange); }
.crumb.current { color: var(--text); border-color: rgba(255,255,255,0.2); cursor: default; }
.crumb-sep { color: var(--muted2); font-size: 12px; }
.conn-result { padding: 20px 32px; flex: 1; overflow-y: auto; }
.conn-node-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--orange);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 20px;
}
.conn-node-label { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.conn-node-meta { font-size: 12px; color: var(--muted2); }
.conn-section-title { font-size: 12px; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; margin-bottom: 10px; }
.conn-edges { display: flex; flex-direction: column; gap: 6px; margin-bottom: 24px; }
.conn-edge {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
}
.edge-relation { font-size: 11px; color: var(--muted2); background: rgba(255,255,255,0.05); padding: 2px 7px; border-radius: 3px; flex-shrink: 0; }
.edge-target { cursor: pointer; color: var(--orange); }
.edge-target:hover { text-decoration: underline; }
.edge-note { font-size: 12px; color: var(--muted); flex: 1; }
.conn-not-found { padding: 32px 0; color: var(--muted2); font-style: italic; }

/* ---- SESSIONS tab ---- */
#tab-sessions { display: none; }
#tab-sessions.active { display: flex; }
.sessions-layout { display: flex; height: 100%; width: 100%; overflow: hidden; }
.session-list {
  width: 180px;
  min-width: 180px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 0;
}
.session-date-item {
  padding: 9px 18px;
  font-size: 13px;
  cursor: pointer;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  transition: background 0.12s, color 0.12s;
  border-left: 2px solid transparent;
}
.session-date-item:hover { background: rgba(255,255,255,0.03); color: var(--text); }
.session-date-item.active { color: var(--text); border-left-color: var(--orange); background: var(--orange-dim); }
.session-detail { flex: 1; overflow-y: auto; padding: 24px 28px; }
.session-report-bar { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
.session-stat { display: flex; flex-direction: column; }
.session-stat span { font-size: 20px; font-weight: 700; }
.session-stat label { font-size: 11px; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.05em; }
.session-section { margin-bottom: 28px; }
.session-section h3 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.conv-markdown { font-size: 13.5px; line-height: 1.75; color: var(--muted); }
.conv-markdown strong { color: var(--text); }
.conv-markdown p { margin-bottom: 10px; }
.conv-markdown h1, .conv-markdown h2 { color: var(--text); margin-bottom: 8px; }
.conv-markdown hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

/* ---- WISHES tab ---- */
.wish-list { padding: 20px 32px; display: flex; flex-direction: column; gap: 12px; }
.wish-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 18px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.wish-body { flex: 1; }
.wish-date { font-size: 11px; color: var(--muted2); margin-bottom: 5px; }
.wish-text { font-size: 13.5px; line-height: 1.6; }

/* ---- modal ---- */
.modal {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
}
.modal.hidden { display: none; }
.modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); }
.modal-box {
  position: relative; z-index: 1;
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  padding: 28px;
  width: 400px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.5);
}
.modal-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
.modal-detail { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
.modal-detail li { margin-left: 16px; margin-top: 4px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ---- scrollbars ---- */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
</style>
</head>
<body>

<aside id="sidebar">
  <div class="logo">G<span>len</span></div>
  <nav id="nav">
    <div class="nav-link active" data-tab="today">Today</div>
    <div class="nav-link" data-tab="chat">Chat</div>
    <div class="nav-link" data-tab="memory">Memory</div>
    <div class="nav-link" data-tab="connections">Connections</div>
    <div class="nav-link" data-tab="sessions">Sessions</div>
    <div class="nav-link" data-tab="wishes">Wishes</div>
  </nav>
  <div class="gauge-wrap">
    <div class="gauge-header">
      <span class="gauge-label">Tokens today</span>
      <span id="gauge-num" class="gauge-num">0</span>
    </div>
    <div class="gauge-track"><div id="gauge-fill" class="gauge-fill"></div></div>
    <div id="gauge-sub" class="gauge-sub">of 70,000</div>
  </div>
</aside>

<main id="main">

  <!-- TODAY -->
  <section id="tab-today" class="tab active">
    <div class="tab-header">
      <h1 id="today-date">—</h1>
      <div class="stat-row">
        <div class="stat"><span id="stat-articles">0</span><label>articles</label></div>
        <div class="stat"><span id="stat-memories">0</span><label>memories</label></div>
        <div class="stat"><span id="stat-tokens">0</span><label>tokens</label></div>
      </div>
    </div>
    <div class="action-row">
      <button id="btn-fetch" class="btn-primary">Fetch Articles</button>
      <button id="btn-rebuild" class="btn-ghost">Rebuild Graph</button>
      <button id="btn-report" class="btn-ghost">Generate Report</button>
    </div>
    <div id="run-log" class="run-log hidden"></div>
    <div id="article-browser" class="article-browser hidden">
      <div class="browser-nav">
        <button id="art-prev" class="nav-btn">←</button>
        <span id="art-counter" class="art-counter">1 / 50</span>
        <button id="art-next" class="nav-btn">→</button>
        <a id="art-link" class="art-link" target="_blank" rel="noopener">↗ Wikipedia</a>
      </div>
      <div id="art-card" class="art-card">
        <div id="art-scores" class="art-scores"></div>
        <h2 id="art-title" class="art-title"></h2>
        <p id="art-extract" class="art-extract"></p>
      </div>
    </div>
  </section>

  <!-- CHAT -->
  <section id="tab-chat" class="tab">
    <div id="chat-picker" class="chat-picker">
      <h2>How should Glen load?</h2>
      <p class="picker-sub">Sets Glen's memory context for this conversation.</p>
      <div class="picker-cards">
        <button class="picker-card" data-mode="lite">
          <strong>Glen Lite</strong>
          <span>Today's memories only — focused, costs fewer tokens</span>
        </button>
        <button class="picker-card" data-mode="full">
          <strong>Glen</strong>
          <span>All memories loaded — richer connections, higher cost</span>
        </button>
      </div>

    <div id="chat-ui" class="chat-ui hidden">
      <div class="chat-topbar">
        <span id="chat-mode-label" class="mode-label"></span>

      <div class="chat-input-wrap">
        <textarea id="chat-input" class="chat-input" placeholder="Talk to Glen..." rows="1"></textarea>
        <button id="chat-send" class="btn-primary">Send</button>
      </div>
      <div class="chat-footer">
        <span id="chat-token-count" class="chat-tokens">0 tokens this session</span>
        <button id="chat-save" class="btn-ghost btn-sm" disabled>Save Conversation</button>
      </div>
    </div>
  </section>

  <!-- MEMORY -->
  <section id="tab-memory" class="tab">
    <div class="tab-header">
      <h1>Memory</h1>
      <div class="memory-controls">
        <input id="memory-search" class="search-input" placeholder="Search memories..." type="text">
        <div class="toggle-group">
          <button class="toggle active" data-source="all">All</button>
          <button class="toggle" data-source="internet">Wikipedia</button>
          <button class="toggle" data-source="human">From Jonny</button>
        </div>
      </div>
    </div>
    <div id="memory-grid" class="memory-grid"></div>
  </section>

  <!-- CONNECTIONS -->
  <section id="tab-connections" class="tab">
    <div class="tab-header">
      <h1>Connections</h1>
      <div class="query-bar">
        <input id="conn-input" class="search-input" placeholder="Query a concept..." type="text">
        <button id="conn-search" class="btn-primary">Explore</button>
      </div>
      <div id="conn-breadcrumb" class="breadcrumb hidden"></div>
    </div>
    <div id="conn-result" class="conn-result"></div>
  </section>

  <!-- SESSIONS -->
  <section id="tab-sessions" class="tab">
    <div class="sessions-layout">
      <div class="session-list" id="session-list"></div>
      <div class="session-detail" id="session-detail">
        <div class="empty-state">Select a session</div>
      </div>
    </div>
  </section>

  <!-- WISHES -->
  <section id="tab-wishes" class="tab">
    <div class="tab-header"><h1>Wishes</h1></div>
    <div id="wish-list" class="wish-list"></div>
  </section>

</main>

<!-- Unsaved changes modal -->
<div id="unsaved-modal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-box">
    <h3>Unsaved changes</h3>
    <div id="modal-detail" class="modal-detail"></div>
    <div class="modal-actions">
      <button id="modal-cancel" class="btn-ghost">Stay</button>
      <button id="modal-leave" class="btn-danger">Leave anyway</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// State
// ============================================================
const state = {
  config: { N: 50, T: 70000 },
  today: { date: '', articles_read: 0, tokens_spent: 0, memories_written: 0 },
  currentTab: 'today',
  articles: [],
  articleIdx: 0,
  chat: { mode: null, messages: [], streaming: false, sessionTokens: 0 },
  connHistory: [],
  tabsLoaded: new Set(['today']),
};

// Tracks what lives only in browser memory and hasn't been persisted
const unsaved = {
  chat: false,
};

// ============================================================
// API helpers
// ============================================================
const api = {
  get: path => fetch(path).then(r => r.json()),
  post: (path, body) => fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  }).then(r => r.json()),
  patch: (path, body) => fetch(path, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  }).then(r => r.json()),
};

// SSE-over-POST: consumes a streaming POST response and fires onEvent for each SSE event
async function streamPost(url, body, onEvent) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const events = buf.split('\n\n');
    buf = events.pop();
    for (const ev of events) {
      const line = ev.trim();
      if (!line.startsWith('data:')) continue;
      try { onEvent(JSON.parse(line.slice(5).trim())); } catch {}
    }
  }
}

// ============================================================
// Token gauge
// ============================================================
function updateGauge(tokens) {
  const { T } = state.config;
  const pct = Math.min(100, (tokens / T) * 100);
  document.getElementById('gauge-fill').style.width = pct + '%';
  document.getElementById('gauge-fill').className = 'gauge-fill' + (pct > 85 ? ' red' : pct > 60 ? ' yellow' : '');
  document.getElementById('gauge-num').textContent = tokens.toLocaleString();
  document.getElementById('gauge-num').style.color = pct > 85 ? 'var(--red)' : pct > 60 ? 'var(--yellow)' : '';
  document.getElementById('gauge-sub').textContent = `of ${T.toLocaleString()}`;

  // Also update today stats
  document.getElementById('stat-tokens').textContent = tokens.toLocaleString();
}

// ============================================================
// Unsaved changes
// ============================================================

// Browser close / refresh
window.addEventListener('beforeunload', e => {
  if (unsaved.chat) {
    e.preventDefault();
    e.returnValue = '';
  }
});

// In-app navigation away from Chat tab
let pendingNav = null;
function showUnsavedModal(onLeave) {
  const items = [];
  if (unsaved.chat) items.push('Chat conversation — not yet saved to <code>conversation-{date}.md</code>');
  document.getElementById('modal-detail').innerHTML =
    'The following changes exist only in the browser:<ul>' + items.map(i => `<li>${i}</li>`).join('') + '</ul>';
  document.getElementById('unsaved-modal').classList.remove('hidden');
  pendingNav = onLeave;
}

document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('unsaved-modal').classList.add('hidden');
  pendingNav = null;
});
document.getElementById('modal-leave').addEventListener('click', () => {
  document.getElementById('unsaved-modal').classList.add('hidden');
  if (pendingNav) { pendingNav(); pendingNav = null; }
});

// ============================================================
// Tab switching
// ============================================================
function switchTab(name, force = false) {
  if (name === state.currentTab) return;
  if (state.currentTab === 'chat' && unsaved.chat && !force) {
    showUnsavedModal(() => switchTab(name, true));
    return;
  }
  document.querySelector('.nav-link.active')?.classList.remove('active');
  document.querySelector(`[data-tab="${name}"]`).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  state.currentTab = name;

  if (!state.tabsLoaded.has(name)) {
    state.tabsLoaded.add(name);
    if (name === 'memory') loadMemories();
    if (name === 'connections') { /* ready on demand */ }
    if (name === 'sessions') loadSessions();
    if (name === 'wishes') loadWishes();
  }
}

document.querySelectorAll('.nav-link').forEach(link => {
  link.addEventListener('click', () => switchTab(link.dataset.tab));
});

// ============================================================
// TODAY tab
// ============================================================
async function loadTodayStatus() {
  const [cfg, rec] = await Promise.all([api.get('/api/config'), api.get('/api/today')]);
  state.config = cfg;
  state.today = rec;
  document.getElementById('today-date').textContent = rec.date || new Date().toISOString().split('T')[0];
  document.getElementById('stat-articles').textContent = rec.articles_read ?? 0;
  document.getElementById('stat-memories').textContent = rec.memories_written ?? 0;
  updateGauge(rec.tokens_spent ?? 0);

  // Load existing session articles if already fetched today
  const sess = await api.get(`/api/sessions/${state.today.date}`);
  if (sess.raw) {
    const arts = sess.raw.articles || (Array.isArray(sess.raw) ? sess.raw : []);
    if (arts.length) initArticleBrowser(arts);
  }
}

function appendLog(text, cls) {
  const log = document.getElementById('run-log');
  log.classList.remove('hidden');
  const line = document.createElement('div');
  line.className = 'log-line' + (cls ? ` ${cls}` : '');
  line.textContent = text;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

async function runFetch() {
  const btn = document.getElementById('btn-fetch');
  btn.disabled = true;
  btn.textContent = 'Fetching...';
  document.getElementById('run-log').innerHTML = '';
  document.getElementById('article-browser').classList.add('hidden');

  try {
    await streamPost('/api/run/fetch', {}, ev => {
      if (ev.type === 'log') appendLog(ev.data);
      if (ev.type === 'error') appendLog(ev.data, 'log-error');
      if (ev.type === 'done') {
        appendLog(ev.data === 'complete' ? '— fetch complete —' : `— exited: ${ev.data} —`,
          ev.data === 'complete' ? 'log-done' : 'log-error');
      }
    });
  } catch (err) {
    appendLog(err.message, 'log-error');
  }

  btn.disabled = false;
  btn.textContent = 'Fetch Articles';

  // Reload status and articles
  await loadTodayStatus();
}

async function runRebuild() {
  const btn = document.getElementById('btn-rebuild');
  btn.disabled = true;
  document.getElementById('run-log').innerHTML = '';
  try {
    await streamPost('/api/run/rebuild', {}, ev => {
      if (ev.type === 'log') appendLog(ev.data);
      if (ev.type === 'error') appendLog(ev.data, 'log-error');
      if (ev.type === 'done') appendLog(ev.data === 'complete' ? '— graph rebuilt —' : `— exited: ${ev.data} —`,
        ev.data === 'complete' ? 'log-done' : 'log-error');
    });
  } catch (err) { appendLog(err.message, 'log-error'); }
  btn.disabled = false;
}

async function runReport() {
  const btn = document.getElementById('btn-report');
  btn.disabled = true;
  try {
    const r = await api.post('/api/run/report', {});
    appendLog(`— report generated: ${r.memories_written} memories —`, 'log-done');
    document.getElementById('stat-memories').textContent = r.memories_written;
  } catch (err) { appendLog(err.message, 'log-error'); }
  btn.disabled = false;
}

document.getElementById('btn-fetch').addEventListener('click', runFetch);
document.getElementById('btn-rebuild').addEventListener('click', runRebuild);
document.getElementById('btn-report').addEventListener('click', runReport);

// ---- Article Browser ----
function initArticleBrowser(articles) {
  state.articles = articles;
  state.articleIdx = 0;
  document.getElementById('article-browser').classList.remove('hidden');
  renderArticle();
}

function renderArticle() {
  const a = state.articles[state.articleIdx];
  if (!a) return;
  const scores = a.heuristic?.scores || {};
  const dims = ['novelty', 'connection', 'elegance', 'surprise', 'depth'];
  document.getElementById('art-scores').innerHTML =
    `<span class="score-pill">score ${(a.heuristic?.total ?? 0).toFixed(2)}</span>` +
    dims.map(d => {
      const v = scores[d] ?? 0;
      const bright = v > 0.3;
      return `<span class="score-pill${bright ? '' : ' dim'}">${d} ${v.toFixed(2)}</span>`;
    }).join('');
  document.getElementById('art-title').textContent = a.title;
  document.getElementById('art-extract').textContent = a.extract || '(no extract)';
  document.getElementById('art-link').href = a.url || '#';
  document.getElementById('art-counter').textContent = `${state.articleIdx + 1} / ${state.articles.length}`;
}

document.getElementById('art-prev').addEventListener('click', () => {
  if (state.articleIdx > 0) { state.articleIdx--; renderArticle(); }
});
document.getElementById('art-next').addEventListener('click', () => {
  if (state.articleIdx < state.articles.length - 1) { state.articleIdx++; renderArticle(); }
});

document.addEventListener('keydown', e => {
  if (state.currentTab !== 'today') return;
  if (document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft') { document.getElementById('art-prev').click(); }
  if (e.key === 'ArrowRight') { document.getElementById('art-next').click(); }
});

// ============================================================
// CHAT tab
// ============================================================

// Mode picker
document.querySelectorAll('.picker-card').forEach(card => {
  card.addEventListener('click', () => {
    state.chat.mode = card.dataset.mode;
    document.getElementById('chat-picker').classList.add('hidden');
    document.getElementById('chat-ui').classList.remove('hidden');
    const label = state.chat.mode === 'lite' ? '<strong>Glen Lite</strong> — today\'s memories' : '<strong>Glen</strong> — all memories';
    document.getElementById('chat-mode-label').innerHTML = label;
    document.getElementById('chat-messages').innerHTML = '';
  });
});

document.getElementById('chat-reset').addEventListener('click', () => {
  if (unsaved.chat) {
    showUnsavedModal(() => resetChatMode());
  } else {
    resetChatMode();
  }
});

function resetChatMode() {
  state.chat.mode = null;
  state.chat.messages = [];
  state.chat.streaming = false;
  state.chat.sessionTokens = 0;
  unsaved.chat = false;
  document.getElementById('chat-picker').classList.remove('hidden');
  document.getElementById('chat-ui').classList.add('hidden');
  document.getElementById('chat-save').disabled = true;
  document.getElementById('chat-token-count').textContent = '0 tokens this session';
  document.getElementById('chat-messages').innerHTML = '';
}

// Message rendering
function appendMessage(role, content, streaming = false) {
  const area = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'you' : 'glen';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble' + (streaming ? ' streaming' : '');
  bubble.textContent = content;
  div.appendChild(label);
  div.appendChild(bubble);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return bubble;
}

function updateChatTokens(add) {
  state.chat.sessionTokens += add;
  const el = document.getElementById('chat-token-count');
  el.textContent = `${state.chat.sessionTokens.toLocaleString()} tokens this session`;
  const total = state.today.tokens_spent + state.chat.sessionTokens;
  const pct = total / state.config.T;
  el.className = 'chat-tokens' + (pct > 0.85 ? ' over' : pct > 0.6 ? ' warn' : '');
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const content = input.value.trim();
  if (!content || state.chat.streaming) return;

  input.value = '';
  input.style.height = 'auto';
  state.chat.messages.push({ role: 'user', content });
  unsaved.chat = true;
  document.getElementById('chat-save').disabled = false;
  appendMessage('user', content);

  state.chat.streaming = true;
  document.getElementById('chat-send').disabled = true;

  const bubble = appendMessage('assistant', '', true);

  try {
    await streamPost('/api/chat', {
      messages: state.chat.messages,
      mode: state.chat.mode,
      date: state.today.date,
    }, ev => {
      if (ev.type === 'text') {
        bubble.textContent += ev.data;
        document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
      }
      if (ev.type === 'done') {
        bubble.classList.remove('streaming');
        const tokens = (ev.data.input_tokens || 0) + (ev.data.output_tokens || 0);
        updateChatTokens(tokens);
        // Persist token usage to server
        api.patch('/api/today/tokens', { tokens }).then(r => {
          state.today.tokens_spent = r.total;
          updateGauge(r.total);
        });
        state.chat.messages.push({ role: 'assistant', content: bubble.textContent });
      }
      if (ev.type === 'error') {
        bubble.textContent = `[error: ${ev.data}]`;
        bubble.classList.remove('streaming');
        bubble.style.color = 'var(--red)';
        state.chat.messages.pop(); // remove empty assistant placeholder
      }
    });
  } catch (err) {
    bubble.textContent = `[error: ${err.message}]`;
    bubble.classList.remove('streaming');
    bubble.style.color = 'var(--red)';
    state.chat.messages.pop();
  }

  state.chat.streaming = false;
  document.getElementById('chat-send').disabled = false;
  input.focus();
}

document.getElementById('chat-send').addEventListener('click', sendMessage);

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Auto-resize textarea
document.getElementById('chat-input').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 160) + 'px';
});

// Save conversation
document.getElementById('chat-save').addEventListener('click', async () => {
  const date = state.today.date;
  const { exists } = await api.get(`/api/sessions/${date}/conversation/exists`);

  let mode = 'write';
  if (exists) {
    const choice = confirm(
      `conversation-${date}.md already exists.\n\nClick OK to append this session, or Cancel to overwrite.`
    );
    mode = choice ? 'append' : 'overwrite';
  }

  const content = formatConversationMd(date, state.chat.mode, state.chat.messages);
  await api.post(`/api/sessions/${date}/conversation`, { content, mode });

  unsaved.chat = false;
  document.getElementById('chat-save').disabled = true;
  appendLog(`conversation saved → conversation-${date}.md`, 'log-done');
});

function formatConversationMd(date, mode, messages) {
  const modeLabel = mode === 'lite' ? 'Glen Lite (today\'s memories)' : 'Glen (all memories)';
  const ts = new Date().toLocaleString();
  const body = messages.map(m => {
    const who = m.role === 'user' ? '**Jonny:**' : '**Glen:**';
    return `${who}\n\n${m.content}`;
  }).join('\n\n---\n\n');
  return `# Glen Session — ${date}\nMode: ${modeLabel}  \nSaved: ${ts}\n\n---\n\n${body}\n`;
}

// ============================================================
// MEMORY tab
// ============================================================
let allMemories = [];
let memSourceFilter = 'all';

function memSource(m) {
  return m._file?.includes('/human/') ? 'human' : 'internet';
}

async function loadMemories() {
  const mems = await api.get('/api/memories');
  allMemories = mems;
  renderMemories();
}

function renderMemories() {
  const q = document.getElementById('memory-search').value.toLowerCase();
  let mems = allMemories;
  if (q) mems = mems.filter(m =>
    [m.topic, m.what, m.why_interesting].some(f => f?.toLowerCase().includes(q))
  );
  if (memSourceFilter !== 'all') mems = mems.filter(m => memSource(m) === memSourceFilter);

  const grid = document.getElementById('memory-grid');
  if (!mems.length) { grid.innerHTML = '<div class="empty-state">No memories found.</div>'; return; }

  grid.innerHTML = mems.map(m => {
    const src = memSource(m);
    const tags = (m.connects_to || []).map(t =>
      `<span class="mem-tag" data-concept="${t}">${t}</span>`
    ).join('');
    return `<div class="memory-card${src === 'human' ? ' human' : ''}">
      <div class="mem-topic">${esc(m.topic)}</div>
      <div class="mem-date">${m.date || ''}${src === 'human' ? ' · from Jonny' : ''}</div>
      <div class="mem-what">${esc(m.what || '')}</div>
      ${m.why_interesting ? `<div class="mem-why">${esc(m.why_interesting)}</div>` : ''}
      ${m.uncertainty ? `<div class="mem-uncertainty">${esc(m.uncertainty)}</div>` : ''}
      ${tags ? `<div class="mem-tags">${tags}</div>` : ''}
    </div>`;
  }).join('');

  // Tag clicks → connections tab
  grid.querySelectorAll('.mem-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      switchTab('connections');
      queryConnections(tag.dataset.concept);
    });
  });
}

document.getElementById('memory-search').addEventListener('input', renderMemories);

document.querySelectorAll('.toggle').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.toggle').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    memSourceFilter = btn.dataset.source;
    renderMemories();
  });
});

// ============================================================
// CONNECTIONS tab
// ============================================================
async function queryConnections(term) {
  if (!term.trim()) return;

  // Update input
  document.getElementById('conn-input').value = term;

  // Update history (avoid duplicates at tail)
  if (state.connHistory[state.connHistory.length - 1] !== term) {
    state.connHistory.push(term);
  }
  renderBreadcrumb();

  const result = await api.get(`/api/graph/query?term=${encodeURIComponent(term)}`);
  renderConnResult(term, result);
}

function renderBreadcrumb() {
  const bc = document.getElementById('conn-breadcrumb');
  if (state.connHistory.length <= 1) { bc.classList.add('hidden'); return; }
  bc.classList.remove('hidden');
  bc.innerHTML = state.connHistory.map((term, i) => {
    const isCurrent = i === state.connHistory.length - 1;
    const crumb = `<span class="crumb${isCurrent ? ' current' : ''}" data-idx="${i}">${esc(term)}</span>`;
    return i < state.connHistory.length - 1 ? crumb + '<span class="crumb-sep">›</span>' : crumb;
  }).join('');

  bc.querySelectorAll('.crumb:not(.current)').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      state.connHistory = state.connHistory.slice(0, idx + 1);
      queryConnections(state.connHistory[idx]);
    });
  });
}

function renderConnResult(term, r) {
  const el = document.getElementById('conn-result');
  if (!r.node && !r.as_source.length && !r.as_target.length) {
    el.innerHTML = `<div class="conn-not-found">No concept found for "<strong>${esc(term)}</strong>" — try a different term or rebuild the graph.</div>`;
    return;
  }

  let html = '';
  if (r.node) {
    html += `<div class="conn-node-box">
      <div class="conn-node-label">${esc(r.node.label)}</div>
      <div class="conn-node-meta">${r.node.date || ''} · ${r.node.file || ''}</div>
    </div>`;
  } else {
    html += `<div class="conn-node-box" style="border-left-color: var(--muted2)">
      <div class="conn-node-label">${esc(term)}</div>
      <div class="conn-node-meta">referenced but no memory file yet</div>
    </div>`;
  }

  if (r.as_source.length) {
    html += `<div class="conn-section-title">Connects outward to</div><div class="conn-edges">`;
    html += r.as_source.map(e =>
      `<div class="conn-edge">
        <span class="edge-relation">${esc(e.relation)}</span>
        <span class="edge-target" data-concept="${esc(e.to_label || e.to)}">${esc(e.to_label || e.to)}</span>
        ${e.note ? `<span class="edge-note">— ${esc(e.note)}</span>` : ''}
      </div>`
    ).join('');
    html += `</div>`;
  }

  if (r.as_target.length) {
    html += `<div class="conn-section-title">Referenced inward from</div><div class="conn-edges">`;
    html += r.as_target.map(e =>
      `<div class="conn-edge">
        <span class="edge-relation">${esc(e.relation)}</span>
        <span class="edge-target" data-concept="${esc(e.from)}">${esc(e.from)}</span>
        ${e.note ? `<span class="edge-note">— ${esc(e.note)}</span>` : ''}
      </div>`
    ).join('');
    html += `</div>`;
  }

  el.innerHTML = html;

  el.querySelectorAll('.edge-target').forEach(t => {
    t.addEventListener('click', () => queryConnections(t.dataset.concept));
  });
}

document.getElementById('conn-search').addEventListener('click', () => {
  const term = document.getElementById('conn-input').value.trim();
  if (term) { state.connHistory = []; queryConnections(term); }
});
document.getElementById('conn-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const term = e.target.value.trim();
    if (term) { state.connHistory = []; queryConnections(term); }
  }
});

// ============================================================
// SESSIONS tab
// ============================================================
async function loadSessions() {
  const dates = await api.get('/api/sessions');
  const list = document.getElementById('session-list');
  if (!dates.length) { list.innerHTML = '<div class="empty-state" style="padding:16px;font-size:12px">No sessions yet</div>'; return; }
  list.innerHTML = dates.map(d =>
    `<div class="session-date-item" data-date="${d}">${d}</div>`
  ).join('');
  list.querySelectorAll('.session-date-item').forEach(item => {
    item.addEventListener('click', () => {
      list.querySelectorAll('.session-date-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      loadSessionDetail(item.dataset.date);
    });
  });
  // Auto-select first
  list.querySelector('.session-date-item')?.click();
}

async function loadSessionDetail(date) {
  const detail = document.getElementById('session-detail');
  detail.innerHTML = '<div class="empty-state">Loading...</div>';
  const data = await api.get(`/api/sessions/${date}`);
  const r = data.report;
  const articles = data.raw?.articles || (Array.isArray(data.raw) ? data.raw : []);

  let html = '';
  if (r) {
    html += `<div class="session-section">
      <div class="session-report-bar">
        <div class="session-stat"><span>${r.articles_read ?? 0}</span><label>articles</label></div>
        <div class="session-stat"><span>${r.memories_written ?? 0}</span><label>memories</label></div>
        <div class="session-stat"><span>${r.tokens_spent ?? 0}</span><label>tokens</label></div>
      </div>
      ${r.wish ? `<div style="font-size:13px;color:var(--muted)">Wish: ${esc(r.wish)}</div>` : ''}
    </div>`;
  }

  if (data.conversation) {
    html += `<div class="session-section">
      <h3>Conversation</h3>
      <div class="conv-markdown">${simpleMarkdown(data.conversation)}</div>
    </div>`;
  }

  if (articles.length) {
    html += `<div class="session-section">
      <h3>Articles (${articles.length})</h3>
      <div id="sess-browser-${date}"></div>
    </div>`;
  }

  detail.innerHTML = html || '<div class="empty-state">No data for this session.</div>';

  // Inline mini article browser for sessions
  if (articles.length) {
    let idx = 0;
    const container = detail.querySelector(`#sess-browser-${date}`);
    const a = articles[idx];
    container.innerHTML = `
      <div class="browser-nav">
        <button class="nav-btn sess-prev">←</button>
        <span class="art-counter sess-counter">1 / ${articles.length}</span>
        <button class="nav-btn sess-next">→</button>
        <a class="art-link sess-link" href="${a.url || '#'}" target="_blank" rel="noopener">↗</a>
      </div>
      <div class="art-card" style="max-height:280px">
        <div class="art-scores sess-scores"></div>
        <h2 class="art-title sess-title">${esc(a.title)}</h2>
        <p class="art-extract sess-extract" style="font-size:12.5px">${esc((a.extract || '').slice(0, 500))}</p>
      </div>`;

    function sessRender() {
      const art = articles[idx];
      container.querySelector('.sess-title').textContent = art.title;
      container.querySelector('.sess-extract').textContent = (art.extract || '').slice(0, 500);
      container.querySelector('.sess-link').href = art.url || '#';
      container.querySelector('.sess-counter').textContent = `${idx + 1} / ${articles.length}`;
      const dims = ['novelty', 'connection', 'elegance', 'surprise', 'depth'];
      container.querySelector('.sess-scores').innerHTML =
        `<span class="score-pill">${(art.heuristic?.total ?? 0).toFixed(2)}</span>` +
        dims.map(d => `<span class="score-pill dim">${d} ${(art.heuristic?.scores?.[d] ?? 0).toFixed(2)}</span>`).join('');
    }
    sessRender();
    container.querySelector('.sess-prev').addEventListener('click', () => { if (idx > 0) { idx--; sessRender(); } });
    container.querySelector('.sess-next').addEventListener('click', () => { if (idx < articles.length - 1) { idx++; sessRender(); } });
  }
}

// ============================================================
// WISHES tab
// ============================================================
async function loadWishes() {
  const wishes = await api.get('/api/wishes');
  const el = document.getElementById('wish-list');
  if (!wishes.length) { el.innerHTML = '<div class="empty-state">No wishes yet.</div>'; return; }
  el.innerHTML = wishes.map(w => `
    <div class="wish-item">
      <span class="badge badge-${w.status}">${w.status}</span>
      <div class="wish-body">
        <div class="wish-date">${w.date}</div>
        <div class="wish-text">${esc(w.wish)}</div>
      </div>
    </div>
  `).join('');
}

// ============================================================
// Utilities
// ============================================================
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function simpleMarkdown(md) {
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^---$/gm, '<hr>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^/, '<p>').replace(/$/, '</p>');
}
